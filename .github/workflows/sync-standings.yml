name: sync-standings (every 30m)

on:
  workflow_dispatch:
  schedule:
    - cron: "15,45 * * * *"

concurrency:
  group: rugby-now-sync-standings
  cancel-in-progress: true

jobs:
  sync_standings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run standings sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLASH_URLS: ${{ vars.FLASH_URLS }}
        run: |
          npm run ensure:flashscore-competitions
          npm run sync:standings

      - name: Export Supabase snapshot
        if: github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run export:supabase-snapshot

      - name: Commit snapshot if changed
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp data/supabase-snapshot.json /tmp/supabase-snapshot.json
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/supabase-snapshot.json data/supabase-snapshot.json
            git add data/supabase-snapshot.json
            git diff --cached --quiet && echo "No snapshot changes to commit." && exit 0
            git commit -m "Update Supabase snapshot [skip ci]"
            git push && exit 0
            echo "Snapshot push retry $attempt failed, retrying..."
            sleep 5
          done
          echo "Failed to push snapshot after 3 attempts."
          exit 1
