name: sync-live-clock (every 5m for live score/time changes)

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

concurrency:
  group: rugby-now-live-clock
  cancel-in-progress: true

jobs:
  sync_live_clock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run strict live clock sync burst
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLASH_URLS: ${{ vars.FLASH_URLS }}
        run: |
          npm run ensure:flashscore-competitions
          for pass in 1 2; do
            echo "Live clock pass ${pass}/2"
            npm run sync:live:clock
            if [ "$pass" -lt 2 ]; then
              echo "Sleeping 90s before the next live clock pass"
              sleep 90
            fi
          done
