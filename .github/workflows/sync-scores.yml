name: sync-matches (every 5m)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: rugby-now-sync-full
  cancel-in-progress: false

jobs:
  sync_scores:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore dependency cache
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node20-sync-full-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run matches sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLASH_URLS: ${{ vars.FLASH_URLS }}
        run: |
          echo "UTC now: $(date -u +'%Y-%m-%d %H:%M:%S')"
          npm run ensure:flashscore-competitions
          npm run sync:matches

      - name: Export Supabase snapshot
        if: github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run export:supabase-snapshot

      - name: Commit snapshot if changed
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp data/supabase-snapshot.json /tmp/supabase-snapshot.json
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/supabase-snapshot.json data/supabase-snapshot.json
            git add data/supabase-snapshot.json
            git diff --cached --quiet && echo "No snapshot changes to commit." && exit 0
            git commit -m "Update Supabase snapshot [skip ci]"
            git push && exit 0
            echo "Snapshot push retry $attempt failed, retrying..."
            sleep 5
          done
          echo "Failed to push snapshot after 3 attempts."
          exit 1
