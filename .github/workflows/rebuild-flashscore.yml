name: rebuild-flashscore

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: rugby-now-rebuild
  cancel-in-progress: false

jobs:
  rebuild_flashscore:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Rebuild Flashscore data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLASH_URLS: ${{ vars.FLASH_URLS }}
          CONFIRM_RESET: "YES"
        run: npm run rebuild:flashscore

      - name: Export Supabase snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run export:supabase-snapshot

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/supabase-snapshot.json
          git diff --cached --quiet && echo "No snapshot changes to commit." && exit 0
          git commit -m "Update Supabase snapshot [skip ci]"
          git push
